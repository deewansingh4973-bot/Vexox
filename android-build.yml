name: Generate Android APK (Vexox)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Build Web App
        run: |
          npm install
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Initialize Android environment (Capacitor)
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npx cap init Vexox com.vexox.app --web-dir dist || true
          npx cap add android || true
          npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        
      - name: Build Release APK and AAB
        working-directory: ./android
        run: |
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # Note: To sign the APK/AAB, you need to add keystore secrets in GitHub and use r0adkll/sign-android-release Action.
      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Vexox-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Unsigned Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: Vexox-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
